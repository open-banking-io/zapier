name: Invite + logo probe (temporary — wiped by next release)

# 1) Invites the user-specified team member (email via secret → masked).
# 2) Probes whether the deploy-key API accepts a logo upload in any shape
#    (URL field, base64, dedicated endpoint, multipart). Statuses logged;
#    no secrets printed.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Invite
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          E1: ${{ secrets.INVITE_EMAIL_1 }}
        run: |
          npm ci
          npx --yes zapier-platform-cli@19 users:add "$E1" --force && echo "invited one user"
      - name: Logo endpoint probes
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
        run: |
          curl -sL https://open-banking.io/icon-512.png -o /tmp/icon.png
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');
          const KEY = process.env.ZAPIER_DEPLOY_KEY;
          const icon = fs.readFileSync('/tmp/icon.png');
          const req = (path, method, headers, body) =>
            new Promise((resolve) => {
              const r = https.request(
                { hostname: 'zapier.com', path, method,
                  headers: { 'X-Deploy-Key': KEY, ...headers } },
                (res) => { let d = ''; res.on('data', (c) => (d += c));
                  res.on('end', () => resolve({ s: res.statusCode, b: d.slice(0, 160) })); },
              );
              r.on('error', (e) => resolve({ s: 'ERR', b: String(e) }));
              if (body) r.write(body);
              r.end();
            });
          (async () => {
            const base = '/api/platform/cli/apps/243680';
            const j = { 'Content-Type': 'application/json' };
            const results = {};
            results['PUT image=dataURI'] = await req(base, 'PUT', j,
              JSON.stringify({ image: `data:image/png;base64,${icon.toString('base64')}` }));
            results['GET /image'] = await req(`${base}/image`, 'GET', {});
            results['POST /image json-url'] = await req(`${base}/image`, 'POST', j,
              JSON.stringify({ url: 'https://open-banking.io/icon-512.png' }));
            const boundary = '----probe' + '0'.repeat(12);
            const mp = Buffer.concat([
              Buffer.from(`--${boundary}\r\nContent-Disposition: form-data; name="image"; filename="icon.png"\r\nContent-Type: image/png\r\n\r\n`),
              icon,
              Buffer.from(`\r\n--${boundary}--\r\n`),
            ]);
            results['POST /image multipart'] = await req(`${base}/image`, 'POST',
              { 'Content-Type': `multipart/form-data; boundary=${boundary}`, 'Content-Length': mp.length }, mp);
            for (const [k, v] of Object.entries(results)) console.log(k, '→', v.s, v.b.replace(/\n/g, ' '));
            const full = await new Promise((resolve) => {
              const r = https.request(
                { hostname: 'zapier.com', path: base, method: 'GET', headers: { 'X-Deploy-Key': KEY } },
                (res) => { let d = ''; res.on('data', (c) => (d += c)); res.on('end', () => resolve(d)); },
              );
              r.end();
            });
            try { console.log('final image value:', JSON.stringify(JSON.parse(full).image)); }
            catch { console.log('final check parse issue'); }
          })();
          EOF
