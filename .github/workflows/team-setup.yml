name: Team setup (temporary — wiped by next release)

# 1) Invites the user-specified team members (emails via secrets → masked
#    in the public logs) so they can build the live Zaps the publishing
#    checks require.
# 2) Inspects the app object for an API-settable logo/image field and, if
#    one exists, points it at the brand icon.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Invite team
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          E1: ${{ secrets.INVITE_EMAIL_1 }}
          E2: ${{ secrets.INVITE_EMAIL_2 }}
        run: |
          npm ci
          for e in "$E1" "$E2"; do
            if [ -n "$e" ]; then
              npx --yes zapier-platform-cli@19 users:add "$e" --force && echo "invited one user"
            fi
          done
          npx --yes zapier-platform-cli@19 users:get || true
      - name: Inspect app object for logo field
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
        run: |
          node <<'EOF'
          const https = require('https');
          const KEY = process.env.ZAPIER_DEPLOY_KEY;
          const get = (path, method = 'GET', body = null) =>
            new Promise((resolve, reject) => {
              const req = https.request(
                { hostname: 'zapier.com', path: `/api/platform/cli${path}`, method,
                  headers: { 'X-Deploy-Key': KEY, 'Content-Type': 'application/json' } },
                (res) => { let d = ''; res.on('data', (c) => (d += c));
                  res.on('end', () => resolve({ status: res.statusCode, body: d })); },
              );
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          (async () => {
            const r = await get('/apps/243680');
            const app = JSON.parse(r.body);
            console.log('app object keys:', Object.keys(app).sort().join(', '));
            for (const k of Object.keys(app)) {
              if (/image|logo|icon|avatar/i.test(k)) console.log('IMAGE FIELD:', k, '=', JSON.stringify(app[k]));
            }
            console.log('intention:', app.intention, '| status:', app.status, '| public:', app.public);
            // If an image-ish field exists, try setting it to the brand icon.
            const imgKey = Object.keys(app).find((k) => /^(image|logo|icon)(_url)?$/i.test(k));
            if (imgKey) {
              const put = await get('/apps/243680', 'PUT', { [imgKey]: 'https://open-banking.io/icon-512.png' });
              console.log('PUT', imgKey, '→', put.status, put.body.slice(0, 300));
              const check = await get('/apps/243680');
              console.log('after:', imgKey, '=', JSON.stringify(JSON.parse(check.body)[imgKey]));
            } else {
              console.log('No API-settable image field found — logo remains web-UI only.');
            }
          })().catch((e) => { console.error(e); process.exit(1); });
          EOF
