name: Update integration metadata (temporary — wiped by next release)

# One-off: updates the Zapier integration's marketing metadata via the
# register update path (deploy key auth). Fixes review check M002
# (description must start with "open-banking.io is a", no "zapier") and
# flips audience to global (public-directory intent).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
        run: |
          npm ci
          npx --yes zapier-platform-cli@19 register "open-banking.io" \
            --desc "open-banking.io is a PSD2 open-banking service that syncs bank accounts and transactions into your tools with zero-knowledge encryption." \
            --url "https://open-banking.io" \
            --audience global \
            --role employee \
            --category accounting \
            --yes
          npx --yes zapier-platform-cli@19 validate || true
