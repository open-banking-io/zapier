name: Invitee status (temporary — wiped by next release)

# Lists invitees + acceptance status. All known emails are provided as
# secrets so GitHub masks them in the public logs; only statuses and
# masked placeholders are visible.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          M1: ${{ secrets.INVITE_EMAIL_1 }}
          M2: ${{ secrets.INVITE_EMAIL_2 }}
          M3: ${{ secrets.INVITE_EMAIL_3 }}
          M4: ${{ secrets.INVITE_EMAIL_4 }}
        run: |
          npm ci
          npx --yes zapier-platform-cli@19 users:get --format json | node -e "
            let d='';
            process.stdin.on('data',(c)=>d+=c).on('end',()=>{
              const users = JSON.parse(d);
              console.log('total invitees:', users.length);
              for (const u of users) {
                const domain = String(u.email||'').split('@')[1] || '?';
                console.log('- domain:', domain, '| status:', u.status ?? JSON.stringify(Object.fromEntries(Object.entries(u).filter(([k])=>k!=='email'))));
              }
            });
          "
