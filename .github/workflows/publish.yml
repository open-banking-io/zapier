name: Publish

# Runs in the open-banking-io/zapier mirror repo (this package lives at its root there),
# pushed by the monorepo's publish-zapier.yml subtree-split. Deploying from the mirror means
# the Zapier platform record points at open-banking-io/zapier, so users in the Zapier app
# directory see a clean dedicated repo.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG_VERSION manifest=$MANIFEST_VERSION"
          [ "$TAG_VERSION" = "$MANIFEST_VERSION" ] || { echo "::error::tag $TAG_VERSION != manifest $MANIFEST_VERSION"; exit 1; }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: npm ci
      - run: npm test

      # `zapier push` builds and uploads the version from package.json.
      # Promoting the uploaded version to users stays a manual step
      # (`zapier promote <version>`).
      - name: Push to Zapier
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
        run: npx --yes zapier-platform-cli@19 push
