name: Invite user (temporary — wiped by next release)

# Invites one user-specified team member (email via secret → masked in
# the public logs).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  invite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          E1: ${{ secrets.INVITE_EMAIL_1 }}
        run: |
          npm ci
          npx --yes zapier-platform-cli@19 users:add "$E1" --force && echo "invited one user"
          npx --yes zapier-platform-cli@19 users:get || true
